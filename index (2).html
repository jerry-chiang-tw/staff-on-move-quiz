<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>你是哪種 STAFF？— STAFF ON MOVE</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; color: #fff; overflow-x: hidden; }

  /* BACKGROUND */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('https://images.unsplash.com/photo-1511497584788-876760111969?w=800&q=80');
    background-size: cover; background-position: center;
    filter: brightness(0.55);
  }
  .bg-overlay { position: fixed; inset: 0; z-index: 1; background: linear-gradient(160deg, rgba(20,10,5,0.4) 0%, rgba(0,20,10,0.3) 100%); }

  /* WRAP */
  .wrap { max-width: 420px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 10; padding: 0; }

  /* SCREEN */
  .screen { display: none; padding: 2.5rem 1.5rem 3rem; animation: fadeUp 0.4s ease; }
  .screen.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* GLASS BASE */
  .glass {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    isolation: isolate;
  }
  .glass-inner {
    position: relative; z-index: 2;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px;
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.1), 0 8px 32px rgba(0,0,0,0.3);
  }

  /* SVG FILTER - hidden */
  .svg-filters { position: absolute; width: 0; height: 0; overflow: hidden; }

  /* LIQUID GLASS ELEMENT */
  .liquid-glass {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
  }
  .liquid-glass .bg-copy {
    position: absolute; inset: -40px;
    background-image: url('https://images.unsplash.com/photo-1511497584788-876760111969?w=800&q=80');
    background-size: cover; background-position: center;
    filter: url(#glass-refract) brightness(0.6);
    z-index: 0;
    pointer-events: none;
  }
  .liquid-glass .glass-surface {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.2);
    border-top-color: rgba(255,255,255,0.4);
    border-radius: 18px;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,0.35),
      inset 0 -1px 0 rgba(0,0,0,0.15),
      inset 1px 0 0 rgba(255,255,255,0.1),
      0 4px 24px rgba(0,0,0,0.25);
  }

  /* INTRO */
  .intro-top { padding-top: 3rem; }
  .som-badge { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 3rem; }
  .som-dot { width: 7px; height: 7px; border-radius: 50%; background: #ff4444; box-shadow: 0 0 8px rgba(255,68,68,0.6); }
  .som-label { font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.7); font-weight: 500; }

  .intro-chars { display: flex; justify-content: center; align-items: flex-end; gap: 4px; margin-bottom: 2.5rem; height: 120px; }
  .intro-chars img { height: 80px; object-fit: contain; opacity: 0.5; filter: brightness(0) invert(1); }
  .intro-chars img:nth-child(2) { height: 100px; opacity: 0.65; }
  .intro-chars img:nth-child(3) { height: 110px; opacity: 0.8; }
  .intro-chars img:nth-child(4) { height: 90px; opacity: 0.55; }

  .intro-title { font-size: 36px; font-weight: 700; line-height: 1.2; margin-bottom: 12px; letter-spacing: -1px; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.4); }
  .intro-title em { color: #ff5555; font-style: normal; }
  .intro-sub { font-size: 15px; color: rgba(255,255,255,0.65); line-height: 1.7; margin-bottom: 2.5rem; }

  .start-btn {
    width: 100%; background: rgba(196,28,28,0.85); color: #fff; border: 1px solid rgba(255,100,100,0.3);
    padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer;
    letter-spacing: 0.5px; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(196,28,28,0.4), inset 0 1px 0 rgba(255,150,150,0.3);
  }
  .start-btn:active { transform: scale(0.97); opacity: 0.9; }

  /* QUESTION */
  .q-screen { padding-top: 2rem; }
  .prog-wrap { margin-bottom: 2rem; }
  .prog-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .prog-qnum { font-size: 12px; color: #ff6666; font-weight: 600; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,100,100,0.5); }
  .prog-count { font-size: 12px; color: rgba(255,255,255,0.5); }
  .back-btn { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 13px; cursor: pointer; padding: 0 0 1.5rem 0; display: flex; align-items: center; gap: 4px; -webkit-tap-highlight-color: transparent; }
  .back-btn:active { opacity: 0.6; }
  .back-btn svg { width: 16px; height: 16px; }
  .prog-bar { height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, #C41C1C, #ff6666); border-radius: 2px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 8px rgba(196,28,28,0.6); }

  .q-text { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.4; margin-bottom: 2rem; letter-spacing: -0.3px; text-shadow: 0 2px 10px rgba(0,0,0,0.4); }

  .opts { display: flex; flex-direction: column; gap: 10px; }

  /* OPTION - LIQUID GLASS */
  .opt {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.18s;
  }
  .opt:active { transform: scale(0.98); }
  .opt .bg-copy {
    position: absolute; inset: -60px;
    background-image: url('https://images.unsplash.com/photo-1511497584788-876760111969?w=800&q=80');
    background-size: cover; background-position: center;
    filter: url(#glass-refract) brightness(0.55);
    z-index: 0; pointer-events: none;
    transition: filter 0.2s;
  }
  .opt .glass-surface {
    position: relative; z-index: 1;
    padding: 18px 20px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.18);
    border-top-color: rgba(255,255,255,0.35);
    border-radius: 16px;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.1);
    font-size: 15px; color: rgba(255,255,255,0.9); text-align: left; line-height: 1.5;
    transition: all 0.18s;
  }
  .opt.selected .bg-copy { filter: url(#glass-refract) brightness(0.35); }
  .opt.selected .glass-surface {
    background: rgba(196,28,28,0.25);
    border-color: rgba(255,100,100,0.5);
    border-top-color: rgba(255,150,150,0.6);
    color: #fff;
    box-shadow: inset 0 1px 0 rgba(255,150,150,0.4), 0 0 20px rgba(196,28,28,0.3);
  }

  /* RESULT */
  .result-screen { padding-top: 2.5rem; }
  .result-eyebrow { font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 1.5rem; }

  .result-char-bg {
    width: 180px; height: 180px; border-radius: 50%;
    background: rgba(196,28,28,0.15);
    border: 1px solid rgba(196,28,28,0.3);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
    box-shadow: 0 0 40px rgba(196,28,28,0.2), inset 0 1px 0 rgba(255,150,150,0.2);
    backdrop-filter: blur(10px);
  }

  .result-name { font-size: 28px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 1.25rem; letter-spacing: -0.5px; text-shadow: 0 2px 20px rgba(0,0,0,0.5); }

  /* GLASS CARD for desc and shoe */
  .glass-card {
    position: relative; border-radius: 18px; overflow: hidden; margin-bottom: 1.25rem;
  }
  .glass-card .bg-copy {
    position: absolute; inset: -60px;
    background-image: url('https://images.unsplash.com/photo-1511497584788-876760111969?w=800&q=80');
    background-size: cover; background-position: center;
    filter: url(#glass-refract) brightness(0.45);
    z-index: 0; pointer-events: none;
  }
  .glass-card .glass-surface {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.18);
    border-top-color: rgba(255,255,255,0.35);
    border-radius: 18px;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 8px 32px rgba(0,0,0,0.2);
    padding: 1.25rem 1.5rem;
  }

  .result-desc { font-size: 14px; color: rgba(255,255,255,0.8); line-height: 1.9; white-space: pre-line; }

  .shoe-eyebrow { font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.45); margin-bottom: 6px; }
  .shoe-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 8px; }
  .shoe-color-pill { display: inline-block; background: rgba(196,28,28,0.7); color: #fff; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-bottom: 1.25rem; border: 1px solid rgba(255,100,100,0.3); letter-spacing: 0.5px; }
  .shoe-img-wrap { width: 100%; height: 170px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; }
  .shoe-img-wrap img { max-width: 100%; max-height: 170px; object-fit: contain; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5)); }

  /* BUTTONS */
  .btn-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
  .btn-red {
    width: 100%; background: rgba(196,28,28,0.85); color: #fff;
    border: 1px solid rgba(255,100,100,0.3);
    padding: 17px; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer;
    text-decoration: none; display: block; text-align: center; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 20px rgba(196,28,28,0.4), inset 0 1px 0 rgba(255,150,150,0.3);
    backdrop-filter: blur(10px);
  }
  .btn-red:active { transform: scale(0.97); opacity: 0.9; }

  .btn-glass {
    position: relative; border-radius: 14px; overflow: hidden; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: transform 0.18s;
  }
  .btn-glass:active { transform: scale(0.97); }
  .btn-glass .bg-copy {
    position: absolute; inset: -40px;
    background-image: url('https://images.unsplash.com/photo-1511497584788-876760111969?w=800&q=80');
    background-size: cover; background-position: center;
    filter: url(#glass-refract) brightness(0.5);
    z-index: 0; pointer-events: none;
  }
  .btn-glass .glass-surface {
    position: relative; z-index: 1;
    padding: 17px; border-radius: 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-top-color: rgba(255,255,255,0.4);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
    font-size: 15px; color: rgba(255,255,255,0.9);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    text-decoration: none;
  }
  .btn-ghost { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 13px; cursor: pointer; padding: 10px; text-align: center; width: 100%; margin-top: 4px; text-decoration: underline; }

  .ig-icon { width: 20px; height: 20px; }

  /* SAVE CARD */
  .save-card { background: #1a1a1a; border-radius: 20px; padding: 2rem 1.5rem; margin-bottom: 1rem; text-align: center; position: relative; overflow: hidden; }
  .save-card-badge { font-size: 10px; letter-spacing: 3px; color: #888; margin-bottom: 1.5rem; }
  .save-card-char { height: 120px; object-fit: contain; margin-bottom: 1rem; filter: brightness(0) invert(1); }
  .save-card-type { font-size: 11px; letter-spacing: 2px; color: #C41C1C; margin-bottom: 6px; }
  .save-card-name { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 1rem; letter-spacing: -0.5px; }
  .save-card-divider { height: 1px; background: #333; margin-bottom: 1rem; }
  .save-card-shoe-label { font-size: 10px; letter-spacing: 2px; color: #666; margin-bottom: 6px; }
  .save-card-shoe-color { font-size: 13px; color: #fff; font-weight: 500; margin-bottom: 1rem; }
  .save-card-shoe-img { height: 100px; object-fit: contain; margin-bottom: 1rem; }
  .save-card-footer { font-size: 10px; letter-spacing: 2px; color: #555; }
  .save-card-hashtag { font-size: 11px; color: #C41C1C; margin-top: 4px; }
</style>
</head>
<body>

<!-- SVG REFRACTION FILTER -->
<svg class="svg-filters" style="position:absolute;width:0;height:0;overflow:hidden;">
  <defs>
    <filter id="glass-refract" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.012" numOctaves="2" seed="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="scaledNoise">
        <feFuncR type="linear" slope="18" intercept="-8"/>
        <feFuncG type="linear" slope="18" intercept="-8"/>
      </feComponentTransfer>
      <feDisplacementMap in="SourceGraphic" in2="scaledNoise" scale="22" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="0.5"/>
    </filter>
  </defs>
</svg>

<!-- BACKGROUND -->
<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<div class="wrap">

    { t: "馬上想下一個挑戰是什麼", v: "B" },
    { t: "拍照傳群組，分享給所有人", v: "C" }
  ]}
];

const Rs = {
  A: { name:"初級大人", char:"images/people_1.png", color:"灰金屬｜79606-011", img:"images/79606-011.png", link:"https://www.abc-mart.com.tw/product/79606-011", desc:"穩重但不死板，做事前習慣先想清楚。\n表面看起來很沉著，\n但偶爾還是會在心裡問自己「這樣對嗎？」\n\n沒關係，這才是真實的大人。\n你的幸運色是灰金屬——\n低調、耐看，越看越有質感。" },
  B: { name:"YBSG", char:"images/people_2.png", color:"黑金屬｜79606-001", img:"images/79606-001.png", link:"https://www.abc-mart.com.tw/product/79606-001", desc:"什麼都做得很誇張，但就是這麼有爆發力。\n別人還在想的時候，你已經在做了。\n有時候讓人跟不上，\n但回頭看，你早就到終點了。\n\n你的幸運色是黑金屬——\n強烈、有存在感，一出場就是焦點。" },
  C: { name:"留友看", char:"images/people_3.png", color:"褐金屬｜79606-257", img:"images/79606-257.png", link:"https://www.abc-mart.com.tw/product/79606-257", desc:"生活裡什麼都想分享，\n朋友是你最大的動力來源。\n你不只享受當下，還要讓所有人都知道。\n\n你的幸運色是褐金屬——\n溫暖、親切，走到哪都讓人想靠近。" },
  D: { name:"高麗菜煮蛋那桌", char:"images/people_4.png", color:"綠金屬｜79606-345", img:"images/79606-345.png", link:"https://www.abc-mart.com.tw/product/79606-345", desc:"看起來普通，但細節滿滿。\n低調地有自己的一套，\n懂生活的人才看得出你的好。\n\n你的幸運色是綠金屬——\n沉穩、有個性，越靠近越發現它的層次。" }
};

let scores = {A:0,B:0,C:0,D:0};
let cur = 0;
let lastResult = 'A';
let history = [];

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  setTimeout(() => {
    const el = document.getElementById(id);
    el.classList.add('active');
    window.scrollTo(0, 0);
    if (id === 's-q') showQ();
  }, 50);
}

function makeOpt(o) {
  const div = document.createElement('div');
  div.className = 'opt';
  div.innerHTML = '<div class="bg-copy"></div><div class="glass-surface">' + o.t + '</div>';
  div.onclick = () => pick(o.v, div);
  return div;
}

function showQ() {
  const q = Qs[cur];
  document.getElementById('qnum').textContent = 'Q' + (cur + 1);
  document.getElementById('qcount').textContent = (cur + 1) + ' / 6';
  document.getElementById('pfill').style.width = ((cur + 1) / 6 * 100) + '%';
  document.getElementById('qtext').textContent = q.text;
  document.getElementById('backBtn').style.visibility = cur === 0 ? 'hidden' : 'visible';
  const c = document.getElementById('opts');
  c.innerHTML = '';
  q.opts.forEach(o => c.appendChild(makeOpt(o)));
}

function pick(v, el) {
  document.querySelectorAll('.opt').forEach(b => { b.classList.remove('selected'); b.onclick = null; });
  el.classList.add('selected');
  history.push(v);
  scores[v]++;
  setTimeout(() => {
    cur++;
    if (cur < Qs.length) { showQ(); }
    else { showResult(); }
  }, 380);
}

function goBack() {
  if (cur === 0) return;
  const prev = history.pop();
  scores[prev]--;
  cur--;
  showQ();
}

function showResult() {
  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  lastResult = top;
  const r = Rs[top];
  document.getElementById('rchar').src = r.char;
  document.getElementById('rname').textContent = r.name;
  document.getElementById('rdesc').textContent = r.desc;
  document.getElementById('rcolor').textContent = r.color;
  document.getElementById('rimg').src = r.img;
  document.getElementById('rbuy').href = r.link;
  document.getElementById('scChar').src = r.char;
  document.getElementById('scName').textContent = r.name;
  document.getElementById('scColor').textContent = r.color;
  document.getElementById('scShoe').src = r.img;
  goTo('s-result');
}

async function saveImage() {
  const card = document.getElementById('saveCard');
  card.style.display = 'block';
  await new Promise(r => setTimeout(r, 300));
  try {
    const canvas = await html2canvas(card, { scale: 2, backgroundColor: '#1a1a1a', useCORS: true, allowTaint: true });
    card.style.display = 'none';
    const link = document.createElement('a');
    link.download = 'staff-on-move-result.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    card.style.display = 'none';
    alert('儲存失敗，請直接截圖分享！');
  }
}

function shareResult() {
  const r = Rs[lastResult];
  const text = 'STAFF ON MOVE 測驗：我是「' + r.name + '」！\n幸運色 ' + r.color + '\n#STAFFONMOVE #ABCMART';
  if (navigator.share) {
    navigator.share({ text: text, title: '你是哪種 STAFF？' });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('已複製！貼到 IG 限動分享吧 🎉'));
  }
}

function resetQuiz() {
  scores = {A:0,B:0,C:0,D:0};
  cur = 0;
  history = [];
  goTo('s-intro');
}
</script>
